name: provider-litellm-kit
version: 0.1.0
description: LiteLLM multi-provider LLM adapter
author: Beddel Team
adapters:
- port: ILLMProvider
  implementation: LiteLLMAdapter
  description: Multi-provider LLM access via LiteLLM
targets:
  python:
    status: implemented
    module: beddel_provider_litellm
    dependencies:
    - litellm>=1.93,<2
    adapters:
    - port: ILLMProvider
      name: litellm
      target: beddel_provider_litellm.adapter:LiteLLMAdapter
  typescript:
    status: unavailable
    unavailable_reason: LiteLLM is a Python-only multi-provider router. See peer kit provider-vercelai-kit for the TypeScript
      multi-provider equivalent built on the Vercel AI SDK.
