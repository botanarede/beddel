id: update-tenant
description: Modify tenant configuration and redeploy — reads current config, merges changes, validates, builds, and deploys.
version: "1.0"
inputs:
  - name: tenant_id
    type: string
    description: Tenant identifier to update
  - name: project_id
    type: string
    description: Firebase project ID for deploy target
  - name: changes
    type: dict
    description: Partial tenant config to merge into existing configuration
steps:
  - id: read-tenant
    primitive: tool
    config:
      tool: read_tenant
      inputs:
        tenant_id: "{{ inputs.tenant_id }}"
  - id: update-tenant
    primitive: tool
    config:
      tool: update_tenant
      inputs:
        tenant_id: "{{ inputs.tenant_id }}"
        changes: "{{ inputs.changes }}"
  - id: validate-tenant
    primitive: tool
    config:
      tool: validate_tenant
      inputs:
        tenant_json: "{{ steps.update-tenant.output }}"
  - id: build-site
    primitive: tool
    config:
      tool: build_site
      inputs:
        tenant_id: "{{ inputs.tenant_id }}"
  - id: deploy-site
    primitive: tool
    config:
      tool: deploy_site
      inputs:
        tenant_id: "{{ inputs.tenant_id }}"
        project_id: "{{ inputs.project_id }}"
