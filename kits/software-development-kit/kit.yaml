name: software-development-kit
version: "0.1.0"
description: Development workflow tools — validation gates and epic creation
author: Beddel Team
tools:
  - name: pytest_gate
    target: beddel_software_development.tools.gates:pytest_gate
    description: Run pytest with fail-on-error
    category: gates
  - name: ruff_check_gate
    target: beddel_software_development.tools.gates:ruff_check_gate
    description: Run ruff linter
    category: gates
  - name: ruff_format_gate
    target: beddel_software_development.tools.gates:ruff_format_gate
    description: Run ruff formatter check
    category: gates
  - name: mypy_gate
    target: beddel_software_development.tools.gates:mypy_gate
    description: Run mypy type checker
    category: gates
workflows:
  - name: create-epic
    path: python/beddel_software_development/workflows/create-epic.yaml
    description: Create epic scaffolding (directories, template files)
targets:
  python:
    status: implemented
    module: beddel_software_development
    dependencies: []
    tools:
      - name: pytest_gate
        target: beddel_software_development.tools.gates:pytest_gate
      - name: ruff_check_gate
        target: beddel_software_development.tools.gates:ruff_check_gate
      - name: ruff_format_gate
        target: beddel_software_development.tools.gates:ruff_format_gate
      - name: mypy_gate
        target: beddel_software_development.tools.gates:mypy_gate
  typescript:
    status: planned
    implementation_path: ./typescript/src/sdk.ts
