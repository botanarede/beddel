name: provider-kimi-kit
version: 0.1.0
description: Kimi K3 LLM provider adapter via OpenAI-compatible API
author: Beddel Team
adapters:
- port: ILLMProvider
  implementation: KimiLLMProvider
  description: Kimi LLM provider via OpenAI-compatible API at api.moonshot.ai/v1
targets:
  python:
    status: implemented
    module: beddel_provider_kimi
    dependencies:
    - openai==1.82.0
    adapters:
    - port: ILLMProvider
      name: kimi
      target: beddel_provider_kimi.adapter:KimiLLMProvider
