name: agent-a2a-kit
version: "0.1.0"
description: "A2A Protocol agent adapter implementing IAgentAdapter"
author: "Beddel Team"
adapters:
  - port: IAgentAdapter
    implementation: A2AAgentAdapter
    description: "Agent adapter for A2A Protocol compliant agents"

targets:
  python:
    module: "beddel_agent_a2a"
    dependencies:
      - "httpx>=0.27.0"
      - "a2a-sdk>=0.2.0"
    adapters:
      - port: IAgentAdapter
        name: a2a
        target: "beddel_agent_a2a.adapter:A2AAgentAdapter"
