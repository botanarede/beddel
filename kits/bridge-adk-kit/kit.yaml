name: bridge-adk-kit
version: 0.1.0
description: ADK Bridge — wraps Beddel workflows as ADK FunctionTools
author: Beddel Team
integrations:
- name: BeddelADKTool
  module: tool
  description: Wraps a Beddel YAML workflow as an ADK FunctionTool
- name: create_adk_agent
  module: agent
  description: Factory for creating ADK agents with Beddel workflow tools
targets:
  python:
    status: implemented
    module: beddel_bridge_adk
    dependencies:
    - google-adk>=2.0.0,<3.0.0
  typescript:
    status: planned
    implementation_path: ./typescript/src/bridge.ts
    dev_note: TS implementation may route through @google/genai or the ADK Node SDK rather than the Python google-adk package.
      Verify ecosystem before implementation.
