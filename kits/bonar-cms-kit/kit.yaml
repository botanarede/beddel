name: bonar-cms-kit
version: 0.1.0
description: >
  Self-contained CMS kit for bonar-cms (Bota na Rede) — encapsulates all packages,
  the Next.js app, tenant templates, and Firebase configs. Full tenant lifecycle:
  generation, validation, build, deploy, preview.
author: Beddel Team
category: solution

config:
  firebase_project: ""
  firebase_account: ""
  default_locale: pt-BR

tools:
  # Generation (planned — CMS.3)
  - name: generate_tenant
    target: "beddel_bonar_cms.tools.generation:generate_tenant"
    description: AI-powered tenant config generation from business briefing
    category: generation

  # Validation (planned — CMS.2)
  - name: validate_tenant
    target: "beddel_bonar_cms.tools.validation:validate_tenant"
    description: Validate tenant JSON against @botanarede/schema (Zod)
    category: validation

  # CRUD (implemented — CMS.1)
  - name: create_tenant
    target: "beddel_bonar_cms.tools.crud:create_tenant"
    description: Write new tenant config JSON to kit-internal tenants directory
    category: crud
  - name: read_tenant
    target: "beddel_bonar_cms.tools.crud:read_tenant"
    description: Load tenant config by ID
    category: crud
  - name: update_tenant
    target: "beddel_bonar_cms.tools.crud:update_tenant"
    description: Merge partial updates into existing tenant config
    category: crud
  - name: list_tenants
    target: "beddel_bonar_cms.tools.crud:list_tenants"
    description: List all tenant IDs with metadata
    category: crud

  # Build (planned — CMS.4)
  - name: build_site
    target: "beddel_bonar_cms.tools.build:build_site"
    description: Next.js static export for a tenant (from kit-internal app)
    category: build

  # Deploy (planned — CMS.5)
  - name: deploy_site
    target: "beddel_bonar_cms.tools.deploy:deploy_site"
    description: Firebase Hosting deploy for a tenant
    category: deploy
  - name: provision_firebase
    target: "beddel_bonar_cms.tools.deploy:provision_firebase"
    description: Create Firebase project + enable APIs via gcloud ADC
    category: deploy

  # Dev (planned — CMS.6)
  - name: preview_site
    target: "beddel_bonar_cms.tools.preview:preview_site"
    description: Start local Next.js dev server for a tenant
    category: dev
  - name: stop_preview
    target: "beddel_bonar_cms.tools.preview:stop_preview"
    description: Stop running preview dev server
    category: dev

  # Admin (CMS.8)
  - name: list_users
    target: "beddel_bonar_cms.tools.admin:list_users"
    description: List all admin users with metadata
    category: admin
  - name: create_user
    target: "beddel_bonar_cms.tools.admin:create_user"
    description: Create a new admin user in the data directory
    category: admin
  - name: update_user_role
    target: "beddel_bonar_cms.tools.admin:update_user_role"
    description: Update an existing user's role
    category: admin
  - name: get_tenant_stats
    target: "beddel_bonar_cms.tools.admin:get_tenant_stats"
    description: Get statistics for a tenant (user count, last build/deploy)
    category: admin

  # SDK (CMS.9)
  - name: init_firebase_app
    target: "beddel_bonar_cms.tools.sdk:init_firebase_app"
    description: Initialize Firebase Admin SDK via bonarjs-sdk-alpha bootstrap
    category: sdk
  - name: sync_tenant_cache
    target: "beddel_bonar_cms.tools.sdk:sync_tenant_cache"
    description: Sync tenant Firestore data to local JSON cache via SDK
    category: sdk
  - name: clear_cache
    target: "beddel_bonar_cms.tools.sdk:clear_cache"
    description: Clear cached JSON files for a tenant or all tenants
    category: sdk

workflows:
  - name: onboarding-novo-cliente
    file: workflows/onboarding-novo-cliente.yaml
    description: Full new client pipeline (provision → generate → validate → save → build → deploy)
  - name: deploy-tenant
    file: workflows/deploy-tenant.yaml
    description: Build + deploy for existing tenant (read → validate → build → deploy)
  - name: update-tenant
    file: workflows/update-tenant.yaml
    description: Modify config + redeploy (read → update → validate → build → deploy)

targets:
  python:
    status: implemented
    module: beddel_bonar_cms
    dependencies: []
    tools:
      - name: generate_tenant
        target: "beddel_bonar_cms.tools.generation:generate_tenant"
      - name: validate_tenant
        target: "beddel_bonar_cms.tools.validation:validate_tenant"
      - name: build_site
        target: "beddel_bonar_cms.tools.build:build_site"
      - name: deploy_site
        target: "beddel_bonar_cms.tools.deploy:deploy_site"
      - name: provision_firebase
        target: "beddel_bonar_cms.tools.deploy:provision_firebase"
      - name: preview_site
        target: "beddel_bonar_cms.tools.preview:preview_site"
      - name: stop_preview
        target: "beddel_bonar_cms.tools.preview:stop_preview"
      - name: create_tenant
        target: "beddel_bonar_cms.tools.crud:create_tenant"
      - name: read_tenant
        target: "beddel_bonar_cms.tools.crud:read_tenant"
      - name: update_tenant
        target: "beddel_bonar_cms.tools.crud:update_tenant"
      - name: list_tenants
        target: "beddel_bonar_cms.tools.crud:list_tenants"
      - name: list_users
        target: "beddel_bonar_cms.tools.admin:list_users"
      - name: create_user
        target: "beddel_bonar_cms.tools.admin:create_user"
      - name: update_user_role
        target: "beddel_bonar_cms.tools.admin:update_user_role"
      - name: get_tenant_stats
        target: "beddel_bonar_cms.tools.admin:get_tenant_stats"
      - name: init_firebase_app
        target: "beddel_bonar_cms.tools.sdk:init_firebase_app"
      - name: sync_tenant_cache
        target: "beddel_bonar_cms.tools.sdk:sync_tenant_cache"
      - name: clear_cache
        target: "beddel_bonar_cms.tools.sdk:clear_cache"
  typescript:
    status: unavailable
    unavailable_reason: >
      bonar-cms-kit encapsulates a Node.js monorepo internally. The Python kit IS
      the orchestration layer — Node.js is the runtime being orchestrated, not a
      separate implementation target.
