# Firebase App Hosting configuration for the unified platform app.
# This file is deployed alongside the Next.js app.
#
# Root directory (set during backend creation): apps/admin
# Live branch: main

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Firebase Client SDK (browser)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: YOUR_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: your-project.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: your-project-id
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: your-project.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "000000000000"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:000000000000:web:5688cb489d74128c6e7ef9"
  - variable: NEXT_PUBLIC_URL_API
    value: ""
  - variable: NEXT_PUBLIC_BONARJS_API_KEY
    value: YOUR_MEASUREMENT_ID

  # Firebase Admin SDK (server-side, secrets)
  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: firebase-service-account-json
  - variable: FIREBASE_PROJECT_ID
    value: your-project-id
  - variable: FIREBASE_STORAGE_BUCKET
    value: your-project.firebasestorage.app
  - variable: FIREBASE_APP_ID
    value: "1:000000000000:web:5688cb489d74128c6e7ef9"

  # CORS — allowed origins for external tenant frontends
  - variable: ALLOWED_ORIGINS
    value: "https://tenant-a.example.com,https://homolog.example.com,https://casasavana.com.br"

  # Email (Postmark)
  - variable: POSTMARK_SERVER_TOKEN
    secret: postmark-server-token

  # Tenant config directory (relative to app root at build time)
  - variable: TENANTS_DIR
    value: ../../tenants
