<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beddel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem}
#app{max-width:640px;width:100%}
.card{background:#13131c;border:1px solid #23233a;border-radius:12px;padding:2rem;margin-bottom:1rem;box-shadow:0 8px 32px rgba(0,0,0,.4)}
h1{font-size:2rem;margin-bottom:.75rem;color:#fff}
h2{font-size:1.6rem;margin-bottom:.6rem;color:#fff}
h3{font-size:1.25rem;margin-bottom:.5rem;color:#fff}
p{margin-bottom:.9rem;color:#b0b0c0;line-height:1.5}
pre{background:#07070d;border:1px solid #23233a;border-radius:8px;padding:1rem;overflow-x:auto;margin-bottom:1rem}
code{font-family:"Fira Code",ui-monospace,monospace;font-size:.85rem;color:#8be9c0;white-space:pre-wrap;word-break:break-word}
label{display:block;font-size:.85rem;color:#9090b0;margin:1rem 0 .35rem}
input[type=text],select{width:100%;padding:.6rem .8rem;border:1px solid #2a2a44;border-radius:6px;background:#07070d;color:#e0e0e0;font-size:.95rem;outline:none}
input[type=text]:focus,select:focus{border-color:#6366f1}
select{appearance:none;-webkit-appearance:none;cursor:pointer}
button{margin-top:1.25rem;width:100%;padding:.75rem;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .15s}
button:hover{opacity:.9}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#6366f1;color:#fff}
.btn-secondary{background:#2a2a44;color:#e0e0e0}
.launch-item{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1rem;border:1px solid #23233a;border-radius:8px;margin-bottom:.6rem;cursor:pointer;transition:border-color .15s}
.launch-item:hover{border-color:#6366f1}
.launch-item .meta{font-size:.8rem;color:#7070a0}
.muted{color:#7070a0;font-size:.85rem}
.error{color:#ff7a7a}
#stream{font-family:"Fira Code",ui-monospace,monospace;font-size:.8rem;color:#8be9c0;white-space:pre-wrap;margin-top:.5rem}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #2a2a44;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  "use strict";
  var app = document.getElementById("app");
  var state = { workflowId: null, inputs: {}, lastConfig: "", abort: null, inputSchema: null, isA2UIForm: false };

  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    attrs = attrs || {};
    for (var k in attrs) {
      if (k === "class") e.className = attrs[k];
      else if (k === "text") e.textContent = attrs[k];
      else e.setAttribute(k, attrs[k]);
    }
    (children || []).forEach(function (c) { if (c) e.appendChild(c); });
    return e;
  }

  function clear() { app.innerHTML = ""; }

  function inputKey(id) {
    return String(id || "").replace(/-(input|select|textinput)$/i, "").replace(/-/g, "_");
  }

  // --- Component rendering -------------------------------------------------
  function renderText(c) {
    var p = c.props || {}, v = (p.variant || "body1").toLowerCase();
    if (v === "h1" || v === "h2" || v === "h3") return el(v, { text: p.content || "" });
    if (v === "code") return el("pre", {}, [el("code", { text: p.content || "" })]);
    return el("p", { text: p.content || "" });
  }

  function renderInput(c) {
    var p = c.props || {};
    var inp = el("input", { type: "text", id: "f_" + c.id, placeholder: p.placeholder || "" });
    if (p.value) inp.value = p.value;
    inp.dataset.key = inputKey(c.id);
    return el("div", {}, [el("label", { text: p.label || c.id }), inp]);
  }

  function renderSelect(c) {
    var p = c.props || {};
    var sel = el("select", { id: "f_" + c.id });
    sel.dataset.key = inputKey(c.id);
    (p.options || []).forEach(function (o) {
      sel.appendChild(el("option", { value: o.value, text: o.label }));
    });
    if (p.value) sel.value = p.value;
    return el("div", {}, [el("label", { text: p.label || c.id }), sel]);
  }

  function isFormSurface(components) {
    return components.some(function (c) { return c.type === "TextInput" || c.type === "Select"; });
  }

  function collectInputs(card) {
    var out = {};
    card.querySelectorAll("[data-key]").forEach(function (n) { out[n.dataset.key] = n.value; });
    return out;
  }

  function renderSurface(components) {
    var card = el("div", { class: "card" });
    var asForm = isFormSurface(components);
    var hasButton = false;

    components.forEach(function (c) {
      if (c.type === "Text") card.appendChild(renderText(c));
      else if (c.type === "TextInput") card.appendChild(renderInput(c));
      else if (c.type === "Select") card.appendChild(renderSelect(c));
      else if (c.type === "Button") {
        hasButton = true;
        var p = c.props || {};
        var cls = (p.variant === "secondary") ? "btn-secondary" : "btn-primary";
        var btn = el("button", { class: cls, text: p.label || "Submit" });
        var btnId = c.id || "";
        btn.onclick = (function (bid) { return function () { onAction(asForm, card, bid); }; })(btnId);
        card.appendChild(btn);
      }
    });

    if (asForm && !hasButton) {
      var b = el("button", { class: "btn-primary", text: "Continue" });
      b.onclick = function () { onAction(true, card); };
      card.appendChild(b);
    }

    // Capture generated config text (code block) for the apply action.
    if (!asForm) {
      var codeEl = card.querySelector("code");
      if (codeEl) state.lastConfig = codeEl.textContent;
    }

    clear();
    app.appendChild(card);
  }

  function onAction(isForm, card, btnId) {
    if (btnId === "back-btn") { loadLauncher(); return; }
    if (isForm) {
      state.inputs = collectInputs(card);
      // A2UI-controlled workflows need generate:true to gate LLM execution.
      // Simple workflows (auto-generated schema form) run directly with inputs.
      var payload = Object.assign({}, state.inputs);
      if (state.isA2UIForm) payload.generate = true;
      runWorkflow(state.workflowId, payload, false);
    } else {
      var inputs = Object.assign({}, state.inputs, { apply: true, config_json: state.lastConfig });
      runWorkflow(state.workflowId, inputs, false);
    }
  }

  function showError(msg) {
    clear();
    app.appendChild(el("div", { class: "card" }, [
      el("h3", { text: "Error" }),
      el("p", { class: "error", text: msg || "Something went wrong." }),
      (function () { var b = el("button", { class: "btn-secondary", text: "Back" }); b.onclick = loadLauncher; return b; })(),
    ]));
  }

  function showLoading(label) {
    clear();
    var card = el("div", { class: "card" });
    card.appendChild(el("p", {}, [el("span", { class: "spinner" }), document.createTextNode(label || "Working…")]));
    var stream = el("div", { id: "stream" });
    card.appendChild(stream);
    app.appendChild(card);
  }

  // --- Schema-based form auto-generation -----------------------------------
  function renderSchemaForm(schema) {
    if (!schema || !schema.properties) { showError("Workflow has no input_schema."); return; }
    state.isA2UIForm = false;
    var components = [];
    var props = schema.properties;
    components.push({ type: "Text", id: "auto-title", props: { content: "Inputs", variant: "h3" } });
    for (var key in props) {
      if (!props.hasOwnProperty(key)) continue;
      var f = props[key];
      if (f.type === "boolean") continue; // internal flags
      if (f.enum) {
        components.push({ type: "Select", id: key + "-select", props: {
          label: f.description || key, options: f.enum.map(function (v) { return { label: v, value: v }; })
        }});
      } else {
        components.push({ type: "TextInput", id: key + "-input", props: {
          label: f.description || key, placeholder: f.default != null ? String(f.default) : ""
        }});
      }
    }
    components.push({ type: "Button", id: "run-btn", props: { label: "Run", variant: "primary" } });
    renderSurface(components);
  }

  // --- SSE workflow execution ---------------------------------------------
  function runWorkflow(id, inputs, stopAtForm) {
    if (state.abort) state.abort.abort();
    var controller = new AbortController();
    state.abort = controller;
    showLoading(stopAtForm ? "Loading form…" : "Generating…");

    fetch("/workflows/" + encodeURIComponent(id) + "/", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify(inputs || {}),
      signal: controller.signal,
    }).then(function (resp) {
      if (!resp.ok) throw new Error("Server returned " + resp.status);
      var reader = resp.body.getReader();
      var dec = new TextDecoder();
      var buf = "";
      var gotForm = false;

      function pump(res) {
        if (res.done) {
          // Stream ended — if pass 1 and no form was captured, auto-generate from schema
          if (stopAtForm && !gotForm && state.inputSchema) {
            renderSchemaForm(state.inputSchema);
          }
          // Stream ended on pass 2 — show accumulated text as result card
          if (!stopAtForm) {
            var streamEl = document.getElementById("stream");
            var text = streamEl ? streamEl.textContent : "";
            if (text) {
              renderSurface([
                { type: "Text", id: "result-title", props: { content: "Result", variant: "h3" } },
                { type: "Text", id: "result-body", props: { content: text, variant: "code" } },
                { type: "Button", id: "back-btn", props: { label: "Back", variant: "secondary" } },
              ]);
            }
          }
          return;
        }
        buf += dec.decode(res.value, { stream: true });
        var frames = buf.split(/\r?\n\r?\n/);
        buf = frames.pop();
        for (var i = 0; i < frames.length; i++) {
          var result = handleFrame(frames[i], stopAtForm, controller);
          if (result === "form") { gotForm = true; return; }
          if (result === "error") return;
        }
        return reader.read().then(pump);
      }
      return reader.read().then(pump);
    }).catch(function (err) {
      if (err.name === "AbortError") return;
      // AbortError from form capture is expected — check if we got a form
      if (stopAtForm && !err.message) return;
      showError(err.message);
    });
  }

  function handleFrame(frame, stopAtForm, controller) {
    var event = "", data = "";
    frame.split(/\r?\n/).forEach(function (line) {
      if (line.indexOf("event:") === 0) event = line.slice(6).trim();
      else if (line.indexOf("data:") === 0) data += line.slice(5).trim();
    });
    if (!event) return false;

    if (event === "error") {
      var e = {};
      try { e = JSON.parse(data); } catch (x) {}
      controller.abort();
      showError(e.message || "Workflow error");
      return "error";
    }
    if (event === "a2ui_surface") {
      var payload;
      try { payload = JSON.parse(data); } catch (x) { return false; }
      var surf = (payload.data && payload.data.surfaceUpdate) || payload.surfaceUpdate || {};
      var comps = surf.components || [];
      if (isFormSurface(comps)) {
        if (stopAtForm) { state.isA2UIForm = true; renderSurface(comps); controller.abort(); return "form"; }
        return false; // skip form surfaces on the run pass
      }
      renderSurface(comps);
      return false;
    }
    if (event === "text_chunk") {
      var s = document.getElementById("stream");
      var t = "";
      try { t = (JSON.parse(data).data || {}).text || ""; } catch (x) {}
      if (s) s.textContent += t;
    }
    return false;
  }

  // --- Launcher ------------------------------------------------------------
  function loadLauncher() {
    state = { workflowId: null, inputs: {}, lastConfig: "", abort: null, inputSchema: null, isA2UIForm: false };
    clear();
    app.appendChild(el("div", { class: "card" }, [
      el("h1", { text: "Beddel" }),
      el("p", { text: "Pick a workflow to get started." }),
      el("div", { id: "list" }, [el("p", { class: "muted", text: "Loading workflows…" })]),
    ]));

    fetchWorkflows().then(function (list) {
      var box = document.getElementById("list");
      box.innerHTML = "";
      if (!list.length) { box.appendChild(el("p", { class: "muted", text: "No workflows available." })); return; }
      list.forEach(function (w) {
        var desc = w.description ? el("span", { class: "muted", text: " — " + w.description.slice(0, 60) }) : null;
        var item = el("div", { class: "launch-item" }, [
          el("span", {}, [document.createTextNode(w.name || w.id), desc].filter(Boolean)),
          el("span", { class: "meta", text: w.id }),
        ]);
        item.onclick = function () {
          state.workflowId = w.id;
          state.inputSchema = w.input_schema || null;
          // If workflow has input_schema with properties, show auto-generated form first.
          // The user fills it, then we run the workflow with their inputs.
          // Workflows that control their own form (A2UI) have empty/no input_schema
          // or use internal flags (generate=true) to gate LLM execution.
          var schema = w.input_schema;
          if (schema && schema.properties && Object.keys(schema.properties).length > 0) {
            // Check if it looks like an A2UI-controlled workflow (has boolean flags like generate/apply)
            var hasFlags = schema.properties.generate || schema.properties.apply || schema.properties.save || schema.properties.submit;
            if (hasFlags) {
              // A2UI workflow: SSE pass 1 gets the custom form (flags gate LLM execution)
              runWorkflow(w.id, {}, true);
            } else {
              // Simple workflow: auto-generate form from schema, run after submit
              renderSchemaForm(schema);
            }
          } else {
            // No schema → run directly
            runWorkflow(w.id, {}, false);
          }
        };
        box.appendChild(item);
      });
    });
  }

  function fetchWorkflows() {
    return fetch("/workflows").then(function (r) {
      if (!r.ok) throw new Error();
      return r.json();
    }).catch(function () {
      return fetch("/api/flows").then(function (r) { return r.ok ? r.json() : []; }).catch(function () { return []; });
    }).then(function (list) {
      return (list || []).map(function (w) {
        return { id: w.id, name: w.name, description: w.description || "", input_schema: w.input_schema || null };
      });
    });
  }

  loadLauncher();
})();
</script>
</body>
</html>
