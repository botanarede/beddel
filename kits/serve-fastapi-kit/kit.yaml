name: serve-fastapi-kit
version: 0.1.0
description: FastAPI serving + SSE
author: Beddel Team
integrations:
- name: create_beddel_handler
  module: handler
  description: One-line workflow-to-endpoint factory with SSE streaming
- name: BeddelSSEAdapter
  module: sse
  description: SSE adapter for Beddel workflow event streams
targets:
  python:
    status: implemented
    module: beddel_serve_fastapi
    dependencies:
    - fastapi>=0.100
    - sse-starlette>=1.6
  typescript:
    status: unavailable
    unavailable_reason: FastAPI is a Python-only ASGI framework. See peer kit serve-express-kit for the TypeScript HTTP serving
      equivalent.
