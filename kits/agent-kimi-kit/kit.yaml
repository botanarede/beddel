name: agent-kimi-kit
version: 0.1.0
description: Kimi K3 agent adapter via kimi-agent-sdk Session API
author: Beddel Team
adapters:
- port: IAgentAdapter
  implementation: KimiAgentAdapter
  description: Agent adapter for Moonshot Kimi K3 via kimi-agent-sdk
- port: ICoordinationStrategy
  implementation: KimiSwarmStrategy
  description: Multi-agent coordination via Kimi AgentSwarm tool
targets:
  python:
    status: unavailable
    unavailable_reason: >-
      API incompatibility: adapter passes sandbox_mode (unsupported in SDK 0.0.5)
      and work_dir as str (requires KaosPath). Security hardening needed before
      production: Pillow CVE reachable via ReadMediaFile, approval auto-mode
      insufficient, work_dir not a security boundary. Pending Epic K10B.
    module: beddel_agent_kimi
    dependencies:
    - kimi-agent-sdk==0.0.5
    adapters:
    - port: IAgentAdapter
      name: kimi
      target: beddel_agent_kimi.adapter:KimiAgentAdapter
    - port: ICoordinationStrategy
      name: kimi-agent-swarm
      target: beddel_agent_kimi.swarm:KimiSwarmStrategy
