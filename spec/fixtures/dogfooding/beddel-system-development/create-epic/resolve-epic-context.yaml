# Resolve epic target and collect deterministic context
id: resolve_epic_context
name: Resolve Epic Context
description: >
  Resolves epic number (explicit or auto), derives canonical paths from BMAD config,
  and returns story keys + document paths as JSON for the epic-creator flow.
version: "1.0"

input_schema:
  type: object
  properties:
    project_root:
      type: string
      description: "Path to the poc project root (contains _bmad/ and docs/)"
    epic:
      type: string
      description: "Epic number (e.g., '3') or 'auto'"
  required:
    - project_root
    - epic

steps:
  - id: resolve
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: >
          python3.11 - <<'PY'
          import json, sys, yaml, pathlib, re

          root = pathlib.Path("$input.project_root").resolve()
          epic_arg = "$input.epic".strip()
          cfg_path = root / "_bmad/bmm/config.yaml"
          sprint_path = root / "_bmad-output/implementation-artifacts/sprint-status.yaml"

          def fail(msg):
              print(json.dumps({"status":"ERROR","message":msg}), file=sys.stdout)
              sys.exit(0)

          if not cfg_path.exists():
              fail(f"config missing: {cfg_path}")
          if not sprint_path.exists():
              fail(f"sprint-status missing: {sprint_path}")

          cfg = yaml.safe_load(cfg_path.read_text())
          impl = pathlib.Path(cfg["implementation_artifacts"].replace("{project-root}", str(root)))
          plan = pathlib.Path(cfg["planning_artifacts"].replace("{project-root}", str(root)))
          epics_dir = impl.parent / "planning-artifacts" / "epics" if "planning-artifacts" in str(impl) else plan / "epics"
          epics_dir = epics_dir if epics_dir.is_absolute() else root / epics_dir
          epics_index = epics_dir / "index.md"
          prd_file = root / "docs/prd/prd.md" if (root / "docs/prd/prd.md").exists() else None
          arch_file = root / "docs/architecture/architecture.md" if (root / "docs/architecture/architecture.md").exists() else None

          sprint = yaml.safe_load(sprint_path.read_text())
          dev = sprint.get("development_status", {}) or {}

          # Determine epic_num
          def pick_auto():
              # find first epic-N missing a file
              epic_nums = sorted(
                  int(re.match(r"epic-(\\d+)", k).group(1))
                  for k in dev.keys() if k.startswith("epic-") and re.match(r"epic-(\\d+)", k)
              )
              existing = {p.stem.replace("epic-","") for p in epics_dir.glob("epic-*.md")} if epics_dir.exists() else set()
              for n in epic_nums:
                  if str(n) not in existing:
                      return n
              return None

          if epic_arg.lower() == "auto" or epic_arg == "":
              epic_num = pick_auto()
              if epic_num is None:
                  fail("All epics already have files")
          else:
              if not epic_arg.isdigit():
                  fail("Epic must be a number or 'auto'")
              epic_num = int(epic_arg)
              if f"epic-{epic_num}" not in dev:
                  fail(f"epic-{epic_num} not found in sprint-status.yaml")

          epic_key = f"epic-{epic_num}"
          output_file = epics_dir / f"epic-{epic_num}.md"

          # Story keys for this epic
          story_keys = [
              k for k in dev.keys()
              if re.match(fr"{epic_num}-\\d+-", k)
          ]

          result = {
              "status": "OK",
              "epic_num": epic_num,
              "epic_key": epic_key,
              "output_file": str(output_file),
              "epics_dir": str(epics_dir),
              "epics_index": str(epics_index),
              "sprint_status": str(sprint_path),
              "prd_file": str(prd_file) if prd_file else None,
              "architecture_file": str(arch_file) if arch_file else None,
              "story_keys": sorted(story_keys),
          }
          print(json.dumps(result))
          PY

  - id: guard_status
    primitive: guardrail
    config:
      data: "$stepResult.resolve.result.stdout"
      schema:
        fields:
          status: { type: str, required: true }
          epic_num: { type: int, required: false }
      strategy: correct

  - id: finalize
    primitive: output-generator
    config:
      template: "$stepResult.guard_status.data"
      format: json
