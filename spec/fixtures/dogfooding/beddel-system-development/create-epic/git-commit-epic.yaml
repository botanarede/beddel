# Git commit helper for epic artifacts
id: git_commit_epic
name: Git Commit Epic
description: Stages epic file and index, commits with a standardized message.
version: "1.0"

input_schema:
  type: object
  properties:
    project_root: { type: string }
    epic_file: { type: string }
    epics_index: { type: string }
    epic_num: { type: integer }
    epic_title: { type: string }
  required: [project_root, epic_file, epics_index, epic_num, epic_title]

steps:
  - id: commit
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: >
          cd "$input.project_root" &&
          git add "$input.epic_file" "$input.epics_index" &&
          git commit -m "docs(epics): create epic-$input.epic_num - $input.epic_title" ||
          echo "SKIPPED"

  - id: report
    primitive: output-generator
    config:
      template: |
        {"status":"OK","commit_result":"$stepResult.commit.result.stdout"}
      format: json
