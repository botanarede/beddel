# =============================================================================
# Casa Savana — Weekly Marketing Report Analysis
# =============================================================================
#
# Fetches the latest weekly marketing report from the Casa Savana
# Google Apps Script web app endpoint (doGet), analyzes the data with
# LLM, and generates actionable insights plus a newsletter draft in
# Brazilian Portuguese.
#
# The Apps Script collects data from 4 Google APIs:
#   - GA4 (sessions, users, channels, pages, devices, cities, conversions)
#   - Google Search Console (queries, pages, quick wins)
#   - Google Tag Manager (container version)
#   - Google Business Profile (profile details, reviews)
#
# The doGet() endpoint returns the full report as JSON (13 tabs).
#
# 4-step pipeline:
#   Step 1: Fetch — HTTP GET to Apps Script web app → full JSON
#   Step 2: Analyze — LLM extracts insights from the raw data
#   Step 3: Newsletter — LLM generates a team newsletter draft
#   Step 4: Output — structured final output
#
# Primitives used: tool (x1), llm (x2), output-generator (x1)
# Strategies used: retry (steps 1, 2), skip (step 4)
# Variables used: $input.webapp_url, $input.focus, $stepResult.*
# LLM provider: Groq Llama via LiteLLM (requires GROQ_API_KEY)
#
# Web App URL (v3, public access):
#   https://script.google.com/macros/s/AKfycbxlokMd_Bz6Pl-JSb1zvBEufS5v9awjPYOrZIrpBksnDY8xgn78dHX_3oLWPbAt6y73/exec
#
# Usage:
#   beddel run spec/fixtures/dogfooding/savana-weekly-report.yaml \
#     -i webapp_url="https://script.google.com/macros/s/AKfycbxlokMd_Bz6Pl-JSb1zvBEufS5v9awjPYOrZIrpBksnDY8xgn78dHX_3oLWPbAt6y73/exec"
#
# With focus area:
#   beddel run spec/fixtures/dogfooding/savana-weekly-report.yaml \
#     -i webapp_url="https://script.google.com/macros/s/AKfycbxlokMd_Bz6Pl-JSb1zvBEufS5v9awjPYOrZIrpBksnDY8xgn78dHX_3oLWPbAt6y73/exec" \
#     -i focus="SEO quick wins"
#
# Expected output: structured JSON with raw report, analysis, and newsletter.
# =============================================================================

id: savana_weekly_report
name: "Casa Savana — Weekly Marketing Report Analysis"
description: >
  Fetches the latest Casa Savana weekly marketing report from the
  Google Apps Script web app endpoint, analyzes the data with LLM,
  and generates actionable insights plus a newsletter draft in
  Brazilian Portuguese.
version: "1.0"

input_schema:
  type: object
  properties:
    webapp_url:
      type: string
      description: "Google Apps Script doGet() web app deployment URL"
    focus:
      type: string
      description: >
        Optional focus area for analysis
        (e.g. "SEO quick wins", "review sentiment", "channel performance")
  required:
    - webapp_url

steps:
  # ── Step 1: Fetch report from Apps Script web app ───────
  - id: fetch_report
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: "curl -sL --max-time 60 $input.webapp_url"
        timeout: 90
    execution_strategy:
      type: retry
      retry:
        max_attempts: 3
        backoff_base: 10.0
        jitter: true
    timeout: 180
    metadata:
      phase: collect
      description: "Fetch latest weekly report JSON from Apps Script doGet() via curl"

  # ── Step 2: LLM analyzes the raw data ──────────────────
  - id: analyze
    primitive: llm
    config:
      model: groq/llama-3.3-70b-versatile
      prompt: |
        You are a digital marketing analyst for Casa Savana, a cultural
        house and restaurant in Rio de Janeiro (Centro) that celebrates
        Black culture, African gastronomy, samba, and the African diaspora.

        Analyze this weekly marketing report and produce a structured
        analysis in Brazilian Portuguese.

        REPORT DATA (JSON):
        $stepResult.fetch_report.result.stdout

        FOCUS AREA (if specified): $input.focus

        Produce the following sections:

        1. RESUMO EXECUTIVO
           - Period covered
           - 3-5 key metrics with week-over-week trends
           - Overall health assessment (improving/stable/declining)

        2. TRAFEGO E AUDIENCIA
           - Sessions and users trend (up/down %, why)
           - Top channels driving traffic
           - Device split insights
           - Geographic insights (which cities)

        3. SEO E BUSCA ORGANICA
           - Total clicks and impressions trend
           - Average position movement
           - Top performing queries
           - Quick wins: queries where small position improvements
             would yield significant click gains

        4. CONVERSOES E ENGAJAMENTO
           - Key event counts (generate_lead, sympla_ticket_click,
             menu_engagement)
           - Which pages drive the most engagement
           - Bounce rate analysis

        5. GOOGLE BUSINESS PROFILE
           - Current rating and review count
           - Recent review sentiment (positive/negative themes)
           - Any reviews that need a response

        6. RECOMENDACOES (top 5 action items, prioritized)
           - What to do this week
           - Quick wins to implement
           - Content opportunities

        Write in Brazilian Portuguese, professional but accessible tone.
        Use data from the report to support every claim.
      temperature: 0.3
      max_tokens: 3000
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 5.0
        jitter: true
    timeout: 45
    metadata:
      phase: analyze
      description: "LLM analysis of marketing data with structured insights"

  # ── Step 3: Generate newsletter draft ───────────────────
  - id: newsletter
    primitive: llm
    config:
      model: groq/llama-3.3-70b-versatile
      prompt: |
        Based on the following marketing analysis for Casa Savana,
        write a concise weekly newsletter for the internal team.

        ANALYSIS:
        $stepResult.analyze.content

        FORMAT:
        - Title: "Savana Digital — Semana [week number from report]"
        - Language: Brazilian Portuguese
        - Tone: Informal but professional, motivating
        - Length: 300-500 words
        - Structure:
          * Opening: 1 sentence highlight (best metric of the week)
          * Numeros da Semana: 4-5 key metrics as bullet points
          * O que funcionou: 2-3 wins
          * Atencao: 1-2 items that need attention
          * Proximos passos: 3 action items for the week
          * Closing: motivational one-liner

        Do NOT include raw JSON or technical details.
        Write for a non-technical marketing team.
      temperature: 0.5
      max_tokens: 1500
    timeout: 30
    metadata:
      phase: generate
      description: "Generate internal newsletter draft in Portuguese"

  # ── Step 4: Final structured output ─────────────────────
  - id: output
    primitive: output-generator
    config:
      template: "$stepResult.analyze.content"
    execution_strategy:
      type: skip
    metadata:
      phase: output
      description: "Analysis output"
