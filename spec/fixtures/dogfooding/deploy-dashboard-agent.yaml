# =============================================================================
# Beddel Dashboard Deploy via Agent Skill
# =============================================================================
#
# Single-step workflow that delegates the full deploy pipeline to a Kiro CLI
# agent running the beddel-deploy-dashboard skill. The agent reads SKILL.md
# instructions, executes phases sequentially, and returns structured JSON.
#
# Compared to deploy-dashboard.yaml (7 steps, deterministic):
#   - 1 step instead of 7
#   - LLM-interpreted instructions (adaptive, portable)
#   - Same phases, same fail-fast semantics
#   - Tradeoff: API cost + non-determinism for simplicity + portability
#
# Host wiring requirements:
#   - agent_registry must contain "kiro-cli" -> KiroCLIAgentAdapter instance
#   - kiro-cli binary at ~/.local/bin/kiro-cli
#   - Agent config at .kiro/agents/beddel-deploy-dashboard.json
#   - Skill at .kiro/skills/beddel-deploy-dashboard/SKILL.md
#   - SSH key at ~/.ssh/lightsail-ralecab.pem
#   - VPS reachable via IPv6 (2600:1f18:12bf:4700:4775:6068:f99e:6c0)
#   - pnpm installed locally for Next.js build
#   - rsync installed locally for file sync
# =============================================================================

id: deploy_dashboard_skill
name: Deploy Dashboard (Skill)
description: >
  Full deploy pipeline via agent skill: build Next.js standalone,
  rsync to VPS (IPv6/SSH), restart systemd service, health check.
version: "1.0"

steps:
  - id: deploy
    primitive: agent-exec
    config:
      adapter: kiro-cli
      prompt: "Deploy the Beddel Dashboard to the VPS. Run all phases and return results as JSON."
      model: claude-sonnet-4.6
      sandbox: workspace-write
      tools:
        - beddel-deploy-dashboard
      timeout: 300
      output_schema:
        type: object
        properties:
          deployed:
            type: boolean
          phases:
            type: object
            properties:
              build:
                type: object
              sync_standalone:
                type: object
              sync_static:
                type: object
              sync_public:
                type: object
              restart:
                type: object
              health_check:
                type: object
          failed_phase:
            type: string
          issues:
            type: array
            items:
              type: string
        required:
          - deployed
          - phases
