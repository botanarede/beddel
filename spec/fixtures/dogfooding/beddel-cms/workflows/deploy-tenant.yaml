# =============================================================================
# Beddel CMS — Deploy Tenant Workflow
# =============================================================================
#
# Builds SSG for a tenant app and deploys to Firebase Hosting.
# Wraps the existing manual process: next build → firebase deploy.
#
# Primitives: tool (×3)
# Kits required: tools-shell-kit, tools-http-kit
#
# Usage:
#   beddel run workflows/deploy-tenant.yaml \
#     -i domain="cafearuanda.botanarede.com.br" \
#     -i tenant_name="Café Aruanda"
# =============================================================================

id: deploy_tenant
name: Deploy Tenant Site
description: >
  Build SSG export and deploy to Firebase Hosting for a specific tenant.
version: "1.0"

input_schema:
  type: object
  properties:
    domain:
      type: string
    tenant_name:
      type: string
  required:
    - domain

steps:
  - id: build_ssg
    primitive: tool
    config:
      tool: shell_exec
      command: |
        cd src/apps/$input.domain
        npx next build
      working_dir: "${BONAR_CMS_ROOT}"
      timeout: 120
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 5.0

  - id: deploy_hosting
    primitive: tool
    config:
      tool: shell_exec
      command: |
        firebase deploy --only hosting:bonar-${FIREBASE_SITE_SLUG} --non-interactive
      working_dir: "${BONAR_CMS_ROOT}"
      timeout: 60

  - id: health_check
    primitive: tool
    config:
      tool: http_request
      method: GET
      url: "https://$input.domain/"
      expected_status: 200
      timeout: 15
    execution_strategy:
      type: retry
      retry:
        max_attempts: 3
        backoff_base: 5.0
        jitter: true
