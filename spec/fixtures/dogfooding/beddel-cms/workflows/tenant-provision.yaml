# =============================================================================
# Beddel CMS — Tenant Provisioning Workflow
# =============================================================================
#
# Creates a new tenant: validates input, creates Firestore customer doc,
# scaffolds the Next.js app from template, and triggers initial deploy.
#
# Phase 1 implementation: wraps existing bonar-cms patterns.
#
# Primitives: guardrail, tool (×4), output-generator
# Kits required: tools-http-kit, tools-shell-kit, tools-file-kit
#
# Usage:
#   beddel run workflows/tenant-provision.yaml \
#     -i tenant_name="Café Aruanda" \
#     -i domain="cafearuanda.botanarede.com.br" \
#     -i plan="pro" \
#     -i owner_email="owner@example.com"
#
# ---------------------------------------------------------------------------
# Explicação de cada passo do fluxo:
#
# 1. validate_input (guardrail)
#    Valida os dados de entrada antes de qualquer ação ser executada.
#    - Verifica se o domínio segue o padrão *.botanarede.com.br via regex.
#    - Garante que tenant_name não está vazio.
#    - Confirma que owner_email é um email válido.
#    Se qualquer regra falhar, o workflow é interrompido com mensagem de erro.
#
# 2. create_customer (tool → http_request)
#    Faz uma requisição POST para a API interna do bonar-cms para criar
#    o registro do cliente no Firestore. Envia nome, domínio, plano e
#    email do proprietário. A resposta inclui um token (API key) que será
#    usado nos passos seguintes para configurar o app do tenant.
#
# 3. scaffold_app (tool → shell_exec)
#    Copia o diretório do template (casasavana.botanarede.com.br) para
#    um novo diretório com o nome do domínio do tenant. Em seguida,
#    percorre todos os arquivos .tsx e .ts substituindo "Casa Savana"
#    pelo nome do novo tenant, aplicando o branding inicial.
#
# 4. configure_env (tool → file_write)
#    Cria o arquivo .env dentro do diretório do novo app com todas as
#    variáveis de ambiente necessárias: chave da API do bonar.js (obtida
#    do passo create_customer), credenciais do Firebase, URL da API e
#    título do site. Essas variáveis são usadas pelo Next.js em runtime.
#
# 5. initial_deploy (call-agent)
#    Delega o deploy para um workflow separado (deploy-tenant.yaml),
#    passando domínio e nome do tenant como inputs. Isso desacopla a
#    lógica de deploy do provisionamento, permitindo reusar o workflow
#    de deploy independentemente.
#
# 6. welcome_email (output-generator)
#    Gera o conteúdo do email de boas-vindas com os dados do tenant:
#    URL do site, link do painel admin, plano contratado e instruções
#    iniciais. O template é renderizado em texto plano e entregue como
#    saída do workflow para ser enviado pelo sistema de notificações.
# =============================================================================

id: tenant_provision
name: Tenant Provisioning
description: >
  End-to-end tenant onboarding: validate, create Firestore customer,
  scaffold Next.js app from casasavana template, configure env, deploy.
version: "1.0"

input_schema:
  type: object
  properties:
    tenant_name:
      type: string
      description: Display name for the tenant (e.g., "Café Aruanda")
    domain:
      type: string
      description: Full domain for the tenant site
    plan:
      type: string
      enum: ["free", "pro", "enterprise"]
      description: Billing tier
    owner_email:
      type: string
      format: email
      description: Email of the tenant owner
  required:
    - tenant_name
    - domain
    - plan
    - owner_email

steps:
  - id: validate_input
    primitive: guardrail
    config:
      rules:
        - type: regex
          field: domain
          pattern: "^[a-z0-9-]+\\.botanarede\\.com\\.br$"
          message: "Domain must be a .botanarede.com.br subdomain"
        - type: not_empty
          field: tenant_name
          message: "Tenant name is required"
        - type: email
          field: owner_email
          message: "Valid email required"

  - id: create_customer
    primitive: tool
    config:
      tool: http_request
      method: POST
      url: "${BONAR_CMS_API_URL}/api/internal/create-customer"
      headers:
        Content-Type: application/json
        X-Internal-Key: "${INTERNAL_API_KEY}"
      body:
        name: "$input.tenant_name"
        domain: "$input.domain"
        plan: "$input.plan"
        owner_email: "$input.owner_email"

  - id: scaffold_app
    primitive: tool
    config:
      tool: shell_exec
      command: |
        TEMPLATE_DIR="src/apps/casasavana.botanarede.com.br"
        TARGET_DIR="src/apps/$input.domain"
        cp -r "$TEMPLATE_DIR" "$TARGET_DIR"
        # Replace branding
        find "$TARGET_DIR" -type f -name "*.tsx" -o -name "*.ts" | \
          xargs sed -i "s/Casa Savana/$input.tenant_name/g"
      working_dir: "${BONAR_CMS_ROOT}"

  - id: configure_env
    primitive: tool
    config:
      tool: file_write
      path: "${BONAR_CMS_ROOT}/src/apps/$input.domain/.env"
      content: |
        NEXT_PUBLIC_BONARJS_API_KEY=$stepResult.create_customer.content.token
        NEXT_PUBLIC_FIREBASE_API_KEY=${FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID=${FIREBASE_APP_ID}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
        NEXT_PUBLIC_URL_API=${BONAR_CMS_API_URL}
        NEXT_PUBLIC_BNR_SITE_TITULO=$input.tenant_name

  - id: initial_deploy
    primitive: call-agent
    config:
      workflow: workflows/deploy-tenant.yaml
      inputs:
        domain: "$input.domain"
        tenant_name: "$input.tenant_name"

  - id: welcome_email
    primitive: output-generator
    config:
      template: |
        Subject: Welcome to Beddel CMS — $input.tenant_name is live!

        Hi,

        Your site $input.tenant_name is now live at https://$input.domain

        Dashboard: https://$input.domain/admin
        Plan: $input.plan

        Next steps:
        1. Log in with $input.owner_email
        2. Add your first content in the admin panel
        3. Customize your branding

        — Beddel CMS
      format: text
