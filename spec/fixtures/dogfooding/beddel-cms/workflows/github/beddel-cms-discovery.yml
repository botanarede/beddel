# =============================================================================
# Beddel CMS — Discovery Workflow (GitHub Actions)
# =============================================================================
#
# Proof-of-concept: runs Beddel workflows in GitHub Actions.
# Triggered manually via workflow_dispatch with a question input.
#
# What this proves:
#   1. Beddel installs from PyPI in a clean CI environment
#   2. Beddel CLI can validate and execute YAML workflows
#   3. LLM primitives work with a GEMINI_API_KEY secret
#   4. Workflow results are captured as job output + artifact
#
# Cost: $0 (public repo) or uses free tier minutes (private repo)
# Runtime: ~30-60 seconds
# =============================================================================

name: Beddel CMS Discovery

on:
  workflow_dispatch:
    inputs:
      question:
        description: "Design question for the Beddel CMS discovery assistant"
        required: true
        type: string
        default: "Should tenant apps be separate Next.js apps or one app with dynamic routing?"
      context:
        description: "Additional context (optional)"
        required: false
        type: string
        default: "No additional context"
      mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - validate-only
          - dry-run
          - full-run
        default: dry-run

jobs:
  # ── Job 1: Validate all workflow YAMLs ────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Beddel
        run: pip install beddel

      - name: Validate CMS Discovery Assistant
        run: beddel validate spec/fixtures/dogfooding/beddel-cms/cms-discovery-assistant.yaml

      - name: Validate Research Pipeline
        run: beddel validate spec/fixtures/dogfooding/research-pipeline.yaml

      # CMS operational workflows (tenant-provision, deploy-tenant, content-assist)
      # use ${ENV_VAR} placeholders for host-specific config. These are design-phase
      # sketches — they parse correctly but fail strict variable validation because
      # Beddel only recognizes $input.* and $stepResult.* references.
      # They'll validate once we implement env-var resolution (Phase 2).
      - name: Validate CMS operational workflows (expect design-phase warnings)
        run: |
          echo "=== Operational workflows (design-phase, env-var placeholders) ==="
          for wf in spec/fixtures/dogfooding/beddel-cms/workflows/*.yaml; do
            echo -n "  $(basename $wf): "
            if beddel validate "$wf" 2>/dev/null; then
              echo "PASS"
            else
              echo "SKIP (uses env-var placeholders — expected in design phase)"
            fi
          done

      - name: List available primitives
        run: beddel list-primitives

      - name: Beddel version
        run: beddel version

  # ── Job 2: Dry run (parse + resolve, no LLM calls) ───────────
  dry-run:
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.mode == 'dry-run' || inputs.mode == 'full-run'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Beddel with LLM support
        run: pip install beddel && beddel init --yes

      - name: Show installed packages
        run: pip list | grep -E "beddel|litellm|pydantic|click"

      - name: Dry run — research pipeline (no LLM key needed for parse)
        run: |
          echo "=== Parsing workflow ==="
          beddel validate spec/fixtures/dogfooding/research-pipeline.yaml
          echo ""
          echo "=== Workflow structure validated ==="
          echo "Steps would execute: summarize → extract_keywords → report"
          echo "LLM model: gemini/gemini-2.0-flash"
          echo "This confirms Beddel can parse, resolve variables, and prepare execution in CI."

  # ── Job 3: Full run (actual LLM execution) ────────────────────
  full-run:
    runs-on: ubuntu-latest
    needs: dry-run
    if: inputs.mode == 'full-run'
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Beddel with LLM support
        run: pip install beddel && beddel init --yes

      - name: Check GEMINI_API_KEY is set
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set. Add it in Settings > Secrets."
            exit 1
          fi
          echo "GEMINI_API_KEY is configured (${#GEMINI_API_KEY} chars)"

      - name: Run CMS Discovery Assistant
        id: discovery
        run: |
          beddel run spec/fixtures/dogfooding/beddel-cms/cms-discovery-assistant.yaml \
            -i question="${{ inputs.question }}" \
            -i context="${{ inputs.context }}" \
            --json-output | tee /tmp/discovery-result.json

      - name: Run Research Pipeline (smoke test)
        run: |
          beddel run spec/fixtures/dogfooding/research-pipeline.yaml \
            -i topic="multi-tenant CMS architecture" \
            -i depth="brief" \
            --json-output | tee /tmp/research-result.json

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: beddel-cms-discovery-results
          path: /tmp/*-result.json
          retention-days: 30
