# =============================================================================
# Deploy Beddel — Dogfooding Pipeline
# =============================================================================
#
# Self-deploying workflow: cleans, builds, checks, and publishes the Beddel
# SDK to PyPI using Beddel's own engine. True dogfooding.
#
# 4-step pipeline matching the manual deploy sequence:
#   1. clean_dist  — rm -rf dist/
#   2. build       — python -m build
#   3. check_pkg   — twine check dist/*
#   4. publish     — twine upload dist/*
#
# Primitives: tool (×4)
# Strategies: retry (publish)
#
# Usage:
#   cd src/beddel-py
#   beddel run examples/deploy-beddel.yaml
# =============================================================================

id: deploy_beddel
name: Deploy Beddel to PyPI
description: >
  Self-deploying pipeline: clean, build, check, publish.
  Beddel deploying itself.
version: "1.0"

steps:
  - id: clean_dist
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: "rm -rf dist/"
        cwd: "src/beddel-py"

  - id: build
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: "python -m build"
        cwd: "src/beddel-py"
        timeout: 60
        fail_on_error: true

  - id: check_pkg
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: "twine check dist/*"
        cwd: "src/beddel-py"
        fail_on_error: true

  - id: publish
    primitive: tool
    config:
      tool: shell_exec
      arguments:
        cmd: "twine upload dist/*"
        cwd: "src/beddel-py"
        timeout: 120
        fail_on_error: true
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 5.0
        jitter: true
