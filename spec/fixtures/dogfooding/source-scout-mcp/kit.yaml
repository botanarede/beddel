name: source-scout-kit
version: "1.0.0"
description: >
  MCP server that discovers, validates, and ranks RSS/API sources for any theme.
  Each tool call runs a full beddel workflow pipeline (LLM research → HTTP validation → LLM ranking)
  and returns a JSON array of scored sources.
author: "Beddel Team"

workflows:
  - name: Source Scout
    path: "workflow.yaml"

mcp:
  server: "server.py"
  tools:
    - name: scout_sources
      description: "Discover and rank RSS/API/blog sources for a given theme"
      parameters:
        theme:
          type: string
          required: true
          description: "Topic to find sources for"
        max_sources:
          type: string
          required: false
          description: "Max sources to return (default: 8)"
        lang:
          type: string
          required: false
          description: "Preferred language: pt-br, en, any"

targets:
  python:
    module: "source_scout_mcp"
    dependencies:
      - "mcp>=1.0"
      - "beddel"
      - "httpx>=0.27"
