# =============================================================================
# Source Scout — Generic Theme-Based Source Discovery
# =============================================================================
#
# Token-optimized 4-step pipeline: research → parse → validate → rank.
# Designed to run inside an MCP server — each call = full discovery cycle.
#
# Token budget: ~3k input + ~3k output per run (Groq free tier friendly).
# Optimization: single LLM call combines research+parse, short prompts,
# structured output enforcement, no verbose instructions.
#
# Primitives: llm (×2), tool (×1), output-generator (×1)
# Provider: Groq Llama 3.3 70B (free, fast, 0 cost)
#
# Usage:
#   beddel run workflow.yaml -i theme="gastronomia africana" -i max="8"
# =============================================================================

id: source_scout
name: Source Scout
description: "Discover, validate, and rank RSS/API sources for any theme."
version: "1.0"

input_schema:
  type: object
  properties:
    theme:
      type: string
      description: "Topic to find sources for (e.g. 'cultura negra', 'jazz brasileiro')"
    max:
      type: string
      description: "Max sources to return (default: 8)"
    lang:
      type: string
      description: "Preferred language: pt-br, en, any (default: any)"
  required:
    - theme

steps:
  # Step 1: Research + Parse (single LLM call — saves ~1k tokens vs 2 calls)
  - id: discover
    primitive: llm
    config:
      model: groq/llama-3.3-70b-versatile
      prompt: |
        Find up to $input.max online sources (blogs, news, magazines) about: $input.theme
        Language preference: $input.lang

        Return ONLY a JSON array. Each object:
        {"name":"str","url":"str","feed_url":"str|null","type":"rss|api|blog|news|magazine","lang":"str","desc":"str (max 60 chars)"}

        Rules:
        - WordPress sites: feed_url = url + "/feed/"
        - Blogspot: feed_url = url + "/feeds/posts/default"
        - If unknown: feed_url = null
        - All URLs must start with https://
        - No markdown, no explanation, ONLY the JSON array
      temperature: 0.2
      max_tokens: 1500
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 3.0
        jitter: true
    timeout: 25.0

  # Step 2: Validate first feed (smoke test)
  - id: validate
    primitive: tool
    config:
      tool: http_request
      arguments:
        method: "GET"
        url: "https://noticiapreta.com.br/feed/"
      timeout: 10
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 2.0
        jitter: false

  # Step 3: Rank by quality (single LLM call)
  - id: rank
    primitive: llm
    config:
      model: groq/llama-3.3-70b-versatile
      prompt: |
        Rank these sources by quality for the theme "$input.theme".
        Smoke test: noticiapreta.com.br/feed/ returned status $stepResult.validate.result.status_code

        Sources:
        $stepResult.discover.content

        Add to each object: "score":0.0-1.0, "priority":"high|medium|low"
        Score criteria: has feed_url +0.3, known active site +0.2, topic match +0.3, language match +0.2
        Sort by score desc. Return ONLY the JSON array.
      temperature: 0.1
      max_tokens: 1500
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 5.0
        jitter: true
    timeout: 25.0

  # Step 4: Output
  - id: output
    primitive: output-generator
    config:
      template: "$stepResult.rank.content"
      format: json
    execution_strategy:
      type: skip
