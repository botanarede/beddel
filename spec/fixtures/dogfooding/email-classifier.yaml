# =============================================================================
# Email Auto Responder / Content Classifier
# =============================================================================
#
# 3-step workflow with conditional branching:
#   Step 1: classify intent (technical / general / spam) with retry
#   Step 2: branch — generate response based on classification
#   Step 3: format final output (skip on failure — optional)
#
# Inspired by: Email Auto Responder Flow (CrewAI),
#              Customer Support Agent (LangGraph),
#              Information Gathering via Prompting (LangGraph).
#
# Primitives used: llm (×3 branches), output-generator (×1)
# Strategies used: retry (step 1), skip (step 3)
# Variables used: $input.*, $stepResult.*, if/then/else branching
# LLM provider: Gemini Flash via LiteLLM (requires GEMINI_API_KEY)
#
# Usage:
#   beddel run spec/fixtures/dogfooding/email-classifier.yaml \
#     -i email_body="How do I configure SSL certificates on nginx?" \
#     -i response_format="markdown"
#
# Expected output: Classified response formatted per request.
# =============================================================================

id: email_classifier
name: Email Classifier & Auto Responder
description: >
  Classifies incoming email by intent, routes to the appropriate
  response generator, and formats the output.
version: "1.0"

input_schema:
  type: object
  properties:
    email_body:
      type: string
    response_format:
      type: string
      enum: ["text", "markdown", "json"]
  required:
    - email_body

steps:
  # Step 1 — classify the email intent with retry on transient failures
  - id: classify
    primitive: llm
    config:
      model: gemini/gemini-2.0-flash
      prompt: >
        Classify the following email into exactly one category.
        Reply with ONLY the category name, nothing else.

        Categories: technical, general, spam

        Email:
        $input.email_body
      max_tokens: 10
      temperature: 0.0
    execution_strategy:
      type: retry
      retry:
        max_attempts: 3
        backoff_base: 1.0
        jitter: true
    timeout: 15.0

  # Step 2 — branch based on classification
  - id: respond
    primitive: llm
    if: "$stepResult.classify.content == 'technical'"
    then:
      - id: technical_response
        primitive: llm
        config:
          model: gemini/gemini-2.0-flash
          prompt: >
            You are a senior technical support engineer.
            Write a detailed, helpful response to this technical question.
            Include specific steps or commands where applicable.

            Question: $input.email_body
          temperature: 0.3
          max_tokens: 800
    else:
      - id: general_response
        primitive: llm
        config:
          model: gemini/gemini-2.0-flash
          prompt: >
            You are a friendly customer support agent.
            Write a warm, concise response to this email.
            If it appears to be spam, politely decline and suggest
            the sender verify their request.

            Email: $input.email_body
          temperature: 0.7
          max_tokens: 400

  # Step 3 — format the final output (optional, skip on failure)
  - id: format_output
    primitive: output-generator
    config:
      template: |
        ## Email Classification Result

        **Category:** $stepResult.classify.content

        ### Response

        $stepResult.respond.content

        ---
        _Processed by Beddel Email Classifier v1.0_
      format: "$input.response_format"
    execution_strategy:
      type: skip
    metadata:
      optional: true
      phase: formatting
