# =============================================================================
# Multi-Step Research Pipeline
# =============================================================================
#
# 3-step sequential workflow: summarize → extract keywords → generate report.
# Exercises the core execution loop with cross-step variable resolution.
#
# Inspired by: Research Agent (Agno), Plan-and-Execute (LangGraph),
#              Multi-Step Research Pipeline (CrewAI).
#
# Primitives used: llm (×2), output-generator (×1)
# Strategies used: retry (step 1), fail (default)
# Variables used: $input.topic, $input.depth, $stepResult.*
# LLM provider: Gemini Flash via google-genai (requires GOOGLE_API_KEY or Vertex AI ADC)
#
# Usage:
#   beddel run spec/fixtures/dogfooding/research-pipeline.yaml \
#     -i topic="AI agents" -i depth="detailed"
#
# Expected output: Markdown report combining summary + keywords.
# =============================================================================

id: research_pipeline
name: Research Pipeline
description: >
  Takes a topic, summarizes it, extracts keywords, and generates
  a structured markdown report combining all prior step results.
version: "1.0"

input_schema:
  type: object
  properties:
    topic:
      type: string
    depth:
      type: string
      enum: ["brief", "detailed", "comprehensive"]
  required:
    - topic
    - depth

steps:
  # Step 1 — summarize the topic (retry on transient LLM failures)
  - id: summarize
    primitive: llm
    config:
      model: gemini-2.5-flash
      prompt: >
        Summarize the following topic at a $input.depth level.
        Topic: $input.topic
        Provide a clear, factual summary in 2-3 paragraphs.
      temperature: 0.5
      max_tokens: 500
    execution_strategy:
      type: retry
      retry:
        max_attempts: 3
        backoff_base: 1.5
        jitter: true
    timeout: 30.0

  # Step 2 — extract keywords from the summary
  - id: extract_keywords
    primitive: llm
    config:
      model: gemini-2.5-flash
      prompt: >
        Extract 5-10 keywords from the following summary.
        Return them as a comma-separated list, nothing else.

        Summary: $stepResult.summarize.content
      max_tokens: 100
      temperature: 0.2

  # Step 3 — render the final report as markdown
  - id: report
    primitive: output-generator
    config:
      template: |
        # Research Report: $input.topic

        **Depth:** $input.depth

        ## Summary

        $stepResult.summarize.content

        ## Keywords

        $stepResult.extract_keywords.content

        ---
        _Generated by Beddel Research Pipeline v1.0_
      format: markdown
