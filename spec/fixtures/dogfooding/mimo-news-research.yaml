# =============================================================================
# MiMo News Research — Xiaomi MiMo Provider Dogfooding
# =============================================================================
#
# 3-step sequential workflow using Xiaomi MiMo V2 Flash:
#   1. Research recent news about MiMo models
#   2. Extract key highlights
#   3. Generate structured markdown report
#
# Primitives used: llm (×2), output-generator (×1)
# LLM provider: Xiaomi MiMo V2 Flash via LiteLLM (requires XIAOMI_MIMO_API_KEY)
#
# Usage:
#   beddel run spec/fixtures/dogfooding/mimo-news-research.yaml \
#     -i topic="Xiaomi MiMo AI models"
#
# =============================================================================

id: mimo_news_research
name: MiMo News Research
description: >
  Researches recent news and developments about a given topic using
  Xiaomi MiMo V2 Flash, extracts highlights, and generates a report.
version: "1.0"

input_schema:
  type: object
  properties:
    topic:
      type: string
  required:
    - topic

steps:
  # Step 1 — research the topic
  - id: research
    primitive: llm
    config:
      model: xiaomi_mimo/mimo-v2-flash
      prompt: >
        You are a technology research analyst. Write a comprehensive overview
        of the latest developments and news about: $input.topic

        Cover the following aspects:
        - Model architecture and capabilities
        - Recent releases and version history
        - Benchmark performance and comparisons
        - API availability and pricing
        - Community reception and adoption

        Be factual and specific. Include version numbers, dates, and
        concrete details where possible.
      temperature: 0.5
      max_tokens: 2048
    execution_strategy:
      type: retry
      retry:
        max_attempts: 3
        backoff_base: 1.5
        jitter: true
    timeout: 60.0

  # Step 2 — extract key highlights
  - id: highlights
    primitive: llm
    config:
      model: xiaomi_mimo/mimo-v2-flash
      prompt: >
        From the following research text, extract 5-8 key highlights
        as a numbered list. Each highlight should be one concise sentence.

        Research: $stepResult.research.content
      max_tokens: 512
      temperature: 0.2

  # Step 3 — render the final report
  - id: report
    primitive: output-generator
    config:
      template: |
        # Research Report: $input.topic

        ## Overview

        $stepResult.research.content

        ## Key Highlights

        $stepResult.highlights.content

        ---
        _Generated by Beddel MiMo News Research v1.0_
        _Model: Xiaomi MiMo V2 Flash_
      format: markdown
