# =============================================================================
# Code Quality Gate Pipeline
# =============================================================================
#
# 4-step pipeline: lint → format check → type check → report.
# Exercises tool primitive with fail-fast chaining via if/then branching.
#
# Inspired by: Code Generation & Debugging (AutoGen),
#              Code Assistant with LangGraph (LangGraph),
#              plus our own run-gates-tool.yaml dogfooding fixture.
#
# Primitives used: tool (×3), output-generator (×1)
# Strategies used: fail (default), if/then branching for fail-fast
# Variables used: $input.project_path, $stepResult.*
#
# Differs from run-gates-tool.yaml:
#   - Configurable project path via $input (not hardcoded)
#   - Adds a human-readable report step at the end
#   - Designed as a reusable template for any Python project
#
# Host wiring requirements:
#   - tool_registry must contain: ruff_check, ruff_format, mypy_check
#   - Each tool is a Callable[[dict], Any] returning dict with exit_code key
#
# Usage:
#   beddel run spec/fixtures/dogfooding/code-quality-gate.yaml \
#     -i project_path="src/beddel-py/" \
#     -t ruff_check=beddel_tools.gates:ruff_check \
#     -t ruff_format=beddel_tools.gates:ruff_format \
#     -t mypy_check=beddel_tools.gates:mypy_check
#
# Expected output: Quality report with pass/fail per gate.
# =============================================================================

id: code_quality_gate
name: Code Quality Gate Pipeline
description: >
  Runs linting, format checking, and type checking on a Python project,
  then generates a quality report.
version: "1.0"

input_schema:
  type: object
  properties:
    project_path:
      type: string
      description: "Path to the Python project source directory"
  required:
    - project_path

steps:
  # Step 1 — ruff lint check
  - id: lint
    primitive: tool
    config:
      tool: ruff_check
      arguments:
        cmd: "ruff check $input.project_path"

  # Step 2 — ruff format check
  - id: format_check
    primitive: tool
    config:
      tool: ruff_format
      arguments:
        cmd: "ruff format --check $input.project_path"

  # Step 3 — mypy type check
  - id: typecheck
    primitive: tool
    config:
      tool: mypy_check
      arguments:
        cmd: "mypy $input.project_path"

  # Step 4 — generate human-readable quality report
  - id: report
    primitive: output-generator
    config:
      template: |
        # Code Quality Report

        **Project:** $input.project_path

        | Gate | Tool |
        |------|------|
        | Lint | ruff check |
        | Format | ruff format |
        | Type Check | mypy |

        ---
        _Generated by Beddel Code Quality Gate v1.0_
      format: markdown
