# =============================================================================
# Beddel Validation Gates via Agent Skill
# =============================================================================
#
# Single-step workflow that delegates all 4 quality gates to a Kiro CLI
# agent running the beddel-code-validator skill. The agent reads SKILL.md
# instructions, executes gates sequentially, and returns structured JSON.
#
# Compared to validation-gates.yaml (5 steps, deterministic):
#   - 1 step instead of 5
#   - LLM-interpreted instructions (adaptive, portable)
#   - Same gates, same fail-fast semantics
#   - Tradeoff: API cost + non-determinism for simplicity + portability
#
# Host wiring requirements:
#   - agent_registry must contain "kiro-cli" -> KiroCLIAgentAdapter instance
#   - kiro-cli binary at ~/.local/bin/kiro-cli
#   - Agent config at .kiro/agents/beddel-code-validator.json
#   - Skill at .kiro/skills/beddel-code-validator/SKILL.md
# =============================================================================

id: validation_gates_skill
name: Validation Gates (Skill)
description: "4 quality gates via agent skill: pytest, ruff check, ruff format, mypy."
version: "1.0"

steps:
  - id: validate
    primitive: agent-exec
    config:
      adapter: kiro-cli
      prompt: "Run all 4 quality gates and return results as JSON."
      model: claude-sonnet-4.6
      sandbox: workspace-write
      tools:
        - beddel-code-validator
      output_schema:
        type: object
        properties:
          passed:
            type: boolean
          gates:
            type: object
          failed_gate:
            type: string
          issues:
            type: array
            items:
              type: string
        required:
          - passed
          - gates
