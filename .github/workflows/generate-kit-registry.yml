name: generate-kit-registry

on:
  push:
    branches: [main]
    paths:
      - "kits/**/kit.yaml"
  workflow_dispatch:

jobs:
  generate:
    name: Regenerate kits/registry.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate registry.json
        run: python3 .github/workflows/scripts/generate_registry.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kits/registry.json
          git diff --cached --quiet || git commit -m "chore: regenerate kits/registry.json"
          git push
